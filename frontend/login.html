<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DMRC Housekeeping Management System</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <!-- HEADER & NAVIGATION -->
  <header>
    <div class="header-container">
      <a href="index.html" class="logo">DMRC HMS</a>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#features">Features</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- LOGIN SECTION -->
  <section class="section">
    <div class="form-container">
      <h2>Login</h2>
      
      <div id="message" class="message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your email" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password" 
            required
          >
        </div>

        <button type="submit" class="form-submit">Login</button>
      </form>

      <div class="form-link">
        <p>Demo Credentials:</p>
        <p><strong>Super Admin:</strong> admin@dmrc.gov.in / password123</p>
        <p><strong>User:</strong> user@dmrc.gov.in / password123</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2024 Delhi Metro Rail Corporation. All rights reserved.</p>
  </footer>

  <script src="assets/js/auth.js"></script>
</body>
</html>
